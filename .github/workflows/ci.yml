name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format
        run: uv run ruff format --check .

      - name: ty check
        run: uv run ty check

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Run tests
        run: uv run pytest -v --cov=dlt_worker --cov-report=term-missing --cov-report=json

      - name: Update coverage badge
        if: github.ref == format('refs/heads/{0}', 'master')
        uses: Maoyao233/coverage-badge-action@upgrade-action-version # TODO: switch back to we-cli/coverage-badge-action@main once PR #8 is merged
